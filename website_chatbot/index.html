<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textile Dept Project Chatbot</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #f472b6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1.5rem;
            background: var(--card);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 1rem;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--card);
            border: 1px solid #334155;
        }

        .image-gallery {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .gallery-item {
            flex: 0 0 200px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
        }

        .caption {
            padding: 5px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        footer {
            padding: 1.5rem;
            background: var(--card);
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }

        select {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>Textile Dept chatbot</h1>
        <select id="language">
            <option value="English">English</option>
            <option value="Hindi">Hindi</option>
            <option value="Tamil">Tamil</option>
        </select>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            Hello! I am your Textile Projects assistant. Ask me anything about the 5 core projects.
        </div>
    </div>

    <footer>
        <input type="text" id="query" placeholder="Ask about Baluchari, Muslin, Negamam..."
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </footer>

    <script>
        const API_URL = "http://localhost:8000";

        async function sendMessage() {
            const input = document.getElementById('query');
            const lang = document.getElementById('language').value;
            const query = input.value.trim();
            if (!query) return;

            addMessage(query, 'user');
            input.value = '';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, language: lang })
                });
                const data = await response.json();
                addMessage(data.answer, 'bot', data.images);
            } catch (error) {
                addMessage("Error: Is the backend server running?", 'bot');
            }
        }

        function addMessage(text, sender, images = []) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.innerText = text;

            if (images && images.length > 0) {
                const gallery = document.createElement('div');
                gallery.className = 'image-gallery';
                images.forEach(img => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${API_URL}${img.url}" onclick="window.open('${API_URL}${img.url}')">
                        <div class="caption">${img.description.substring(0, 150)}${img.description.length > 150 ? '...' : ''}</div>
                    `;
                    gallery.appendChild(item);
                });
                div.appendChild(gallery);
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>

</html>
